<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
    <link rel="canonical" href="https://getbootstrap.com/docs/4.5/examples/carousel/">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='index.css') }}">
	<title>HEART+ | Heart Disease Prediction</title>
</head>
<style>
	button
{
	border-style:none;
}

h1, h2, h3, h4, h5{
    text-align: center;

}

form {
	margin-top: 3%;
	margin-left: 29%;
	margin-right: 10%;
  
}

form fieldset{

	padding: 60px;
  text-align: center;
	border-width: 20px;
	border-style: ridge;
    border-color: #5a5a5a;
	background-color: #fff;
}

fieldset h1 {
	color: #5a5a5a;
	padding-bottom: 20px;
	margin-left: 35px;
	display: inline-block;
	cursor: pointer;
	font-size: 28px;
	text-align: center;
}

fieldset label {

	margin-left: 20px;
	margin-right: 40px;
	padding: 23px;
	font-size: 20px;
	display: inline-block;
    width  : 240px;
}

fieldset input,
fieldset select {
    padding: 8px;
    color: #938c8c;
}

fieldset input:focus,
fieldset select:focus {
    color: #000;
}
fieldset button
{
	
	color: #fff;
	background-color: #5a5a5a;
	border-radius: 3px;
	padding: 13px 39px;
	text-align: center;
	letter-spacing: 0.9px;
	text-decoration: none;
	margin-right: 100px;
	line-height: 26px;
	font-size: 16px;
	box-shadow: 0px 1px 3px 0px #5a5a5a;
	right: 0px;
	margin-top: 30px;
}


.submit{
	margin-left: 60px;
	color: #fff;
	background-color: #5a5a5a;
	border-radius: 3px;
	padding: 13px 39px;
	text-align: center;
	letter-spacing: 0.9px;
	text-decoration: none;
	margin-right: 10px;
	line-height: 26px;
	font-size: 16px;
	box-shadow: 0px 1px 3px 0px #5a5a5a;
	right: 100px;
	margin-top: 15px;
}

#link_to_edit{
    padding-left: 45px;
}

.fieldset{
	margin-top: 3%;
	margin-left: 5%;
	margin-right: 5%;
	padding: 30px;
	border-width: 25px;
	border-style:ridge;
  width: 150px;
	border-color: #257a7a;
	box-shadow: 6px 13px 13px 0px black;
	background-color: #ebfffa;
}
</style>
<body>

	<header>
    <nav class="navbar navbar-expand-md navbar-dark fixed-top bg-dark">
                <a class="navbar-brand" href="#"><b>HEART+</b></a>
                <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarCollapse" aria-controls="navbarCollapse" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarCollapse">
                    <ul class="navbar-nav ml-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/dashboard">Get Started</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/disindex">Disease Index</a>
                    </li>
                    
                    <li class="nav-item">
                        <a class="nav-link active" href="/heart">Heart Disease</a>
                    </li>
                    
                    <li class="nav-item">
		                <a class="nav-link" href="/logout">Logout</a>
		            </li>
                    </ul>
                </div>
            </nav>
    </header><br/><br/>
    <h1 style="text-align:center;">Heart Disease Prediction</h1>
    <h5 style="text-align:center;">Please enter the patient details</h5>

    <form action="{{ url_for('predictheart')}}" method="post" class="form-inline">
        <fieldset>
            <div class="tabcontent" id="new">

                <div class="form-group">
                    <label for="age">Age in Years</label>
                    <input class="form-control" style="width:200px;" type="number" name="age" placeholder="eg. 34" required="required" min="1" max="120"/>
                </div>
                <div class="form-group">
                <label for="gender">Gender</label>
                <select class="form-control" style="width:200px;" name="Gender" required>
                  <option value="" disabled selected>Select Gender</option>
                  <option value="1">Male</option>
                  <option value="0">Female</option>
                </select>
              </div>
                <div class="form-group">
                  <label for="chestpain">Chest Pain type</label>
                  <select class="form-control" style="width:200px;" name="ChestPain" required>
                    <option value="" disabled selected>Select Chest Pain</option>
                    <option value="1">Typical Angina</option>
                    <option value="2">Atypical Angina</option>
                    <option value="3">Non-Anginal Pain</option>
                    <option value="4">Asymptomatic</option>
                  </select>
                </div>
                <div class="form-group">
                  <label for="resting bp">Resting BP </label>
                  <input class="form-control" style="width:200px;" type="number" name="resting bp" placeholder="resting bp" required="required" min="0" max="200"/>
                </div>
                <div class="form-group">
                  <label for="cholesterol">Cholesterol</label>
                  <input class="form-control" style="width:200px;" type="number" name="cholesterol" placeholder="cholesterol" required="required" min="0" max="1000"/>
                </div>
                              <div class="form-group">
                <label for="Fasting Blood Sugar">Fasting Blood Sugar</label>
                <select class="form-control" style="width:200px;" name="Fasting Blood Sugar" required>
                  <option value="" disabled selected>Select FBS</option>
                  <option value="0">≤ 120 mg/dl</option>
                  <option value="1">> 120 mg/dl</option>
                </select>
              </div>
                                <div class="form-group">
                  <label for="Resting ECG">Resting ECG </label>
                  <select class="form-control" style="width:200px;" name="Resting ECG" required>
                    <option value="" disabled selected>Select ECG</option>
                    <option value="0">Normal</option>
                    <option value="1">ST-T Wave Abnormality</option>
                    <option value="2">Left Ventricular Hypertrophy</option>
                  </select>
                </div>
                </div>
                <div class="form-group">
  <label for="Exercise Angina">Exercise Angina</label>
  <select class="form-control" style="width:200px;" name="Exercise Angina" required>
    <option value="" disabled selected>Select Angina</option>
    <option value="0">No</option>
    <option value="1">Yes</option>
  </select>
</div>

<div class="form-group">
  <label for="Maximus Heart Rate">Maximum Heart Rate</label>
  <input class="form-control"
         style="width:200px;"
         type="number"
         name="Maximus Heart Rate"
         placeholder="Maximum Heart Rate"
         required="required"
         min="50"
         max="250"/>
</div>


                <div class="form-group">
                  <label for="Old Peak">Old Peak </label>
                  <input class="form-control" style="width:200px;" type="number" step="any" name="Old Peak" placeholder="Old Peak" required="required" min="-10.00" max="10.00">
                </div>
                <div class="form-group">
  <label for="ST slope">ST slope</label>
  <select class="form-control" style="width:200px;" name="ST slope" required>
    <option value="" disabled selected>Select ST Slope</option>
    <option value="1">Upsloping</option>
    <option value="2">Flat</option>
    <option value="3">Downsloping</option>
  </select>
</div>
                  &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<button type="submit" class="btn btn-primary btn-lg">Predict</button>

            </div>
        </fieldset>
    </form>

    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>
</body>
</html>
